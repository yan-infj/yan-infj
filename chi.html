<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天中午吃什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .result {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            min-height: 50px;
            padding: 10px;
            border-radius: 10px;
            background: #fdfdfe;
        }

        .btn {
            padding: 15px 35px;
            font-size: 18px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
        }

        .btn:hover {
            background-color: #ff4757;
            transform: scale(1.05);
        }

        .add-box {
            margin-top: 30px;
        }

        input {
            padding: 12px;
            width: 70%;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍚 今天中午吃什么？</h1>
        <p class="subtitle">选择困难症救星</p>
        
        <div class="result" id="result">点击按钮开始随机</div>
        
        <button class="btn" onclick="randomEat()">帮我选！</button>
        <button class="btn" onclick="clearResult()">重置</button>

        <div class="add-box">
            <input type="text" id="foodInput" placeholder="输入想吃的菜品">
            <button class="btn" onclick="addFood()">添加菜品</button>
        </div>
    </div>

    <script>
        // 默认菜品列表
        let foods = [
            "麻辣烫", "黄焖鸡米饭", "沙县小吃", "兰州拉面",
            "肯德基", "麦当劳", "水饺", "炒饭", "炒面",
            "麻辣香锅", "螺蛳粉", "汉堡", "披萨", "烤肉饭",
            "牛肉面", "鸡公煲", "酸菜鱼", "轻食沙拉", "盖浇饭"
        ];

        // 随机选餐
        function randomEat() {
            let index = Math.floor(Math.random() * foods.length);
            document.getElementById("result").innerText = foods[index];
        }

        // 重置结果
        function clearResult() {
            document.getElementById("result").innerText = "点击按钮开始随机";
        }

        // 添加菜品 修复可用版
        function addFood() {
            let val = document.getElementById("foodInput").value.trim();
            if(val === ""){
                alert("请输入菜品名称");
                return;
            }
            foods.push(val);
            document.getElementById("foodInput").value = "";
            alert("添加成功！可以继续随机啦");
        }
    </script>
</body>
</html>
